<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#6366f1" opacity="0.1"/>
  
  <!-- Sprintify icon - stylized S with arrow -->
  <g transform="translate(25, 25) scale(1.2)">
    <!-- Main S shape with gradient effect -->
    <path d="M 30 15 Q 35 15 35 20 Q 35 25 25 25 L 40 25 Q 45 25 45 30 Q 45 35 35 35 Q 30 35 30 40" 
          stroke="#6366f1" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Arrow indicator -->
    <g transform="translate(45, 32)">
      <path d="M 0 0 L 8 -4 L 5 0 L 8 4 Z" fill="#6366f1"/>
      <line x1="0" y1="0" x2="15" y2="0" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>
</svg>